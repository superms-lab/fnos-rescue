name: Live ISO

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y live-build debian-archive-keyring gettext po4a build-essential autoconf automake libtool pkg-config uuid-dev libblkid-dev libudev-dev libzstd-dev liblzo2-dev zlib1g-dev libxxhash-dev liburing-dev qemu-system-x86 ovmf xorriso
      - name: Install pinned Debian Live Build
        run: |
          git clone https://salsa.debian.org/live-team/live-build.git /tmp/live-build
          git -C /tmp/live-build checkout 37c453337996a3f9cbf80697e2321d8162369776
          sudo make -C /tmp/live-build install
          lb --version
      - run: ./scripts/build-live-iso.sh
      - name: Inspect Live ISO boot configuration
        run: ./scripts/collect-live-iso-diagnostics.sh dist/fnos-rescue-live-amd64.iso dist/live-diagnostics
      - name: Boot Live ISO in BIOS and UEFI modes
        env:
          FNOS_RESCUE_LIVE_DIAGNOSTICS_DIR: dist/live-diagnostics
        run: ./scripts/test-live-iso.sh dist/fnos-rescue-live-amd64.iso
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: always()
        with:
          name: fnos-rescue-live-diagnostics
          path: dist/live-diagnostics
          if-no-files-found: warn
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: always()
        with:
          name: fnos-rescue-live-amd64
          path: |
            dist/fnos-rescue-live-amd64.iso
            dist/fnos-rescue-live-amd64.iso.sha256
          if-no-files-found: error
      - name: Attach ISO to tagged prerelease
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in 1 2 3 4 5; do
            if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
              gh release upload "${GITHUB_REF_NAME}" \
                dist/fnos-rescue-live-amd64.iso \
                dist/fnos-rescue-live-amd64.iso.sha256 --clobber
              exit 0
            fi
            sleep 15
          done
          echo "release was not created by the package workflow" >&2
          exit 1
