name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y btrfs-progs mdadm qemu-utils e2fsprogs ntfs-3g build-essential autoconf automake libtool pkg-config uuid-dev libblkid-dev libudev-dev libzstd-dev liblzo2-dev zlib1g-dev libxxhash-dev liburing-dev
      - run: python -m pip install --upgrade pip build
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: ./scripts/clean-release.sh
      - run: ./scripts/build-recovery-tools.sh
      - run: python -m build
      - run: ./scripts/build-deb.sh
      - run: ./scripts/build-fnos-package.sh
      - run: python scripts/generate-release-metadata.py
      - run: python scripts/verify-release-artifacts.py
      - name: Verify tag matches package version
        run: |
          version=$(python -c 'import fnos_rescue; print(fnos_rescue.__version__)')
          test "v${version}" = "${GITHUB_REF_NAME}"
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --generate-notes --prerelease --title "FNOS Rescue ${GITHUB_REF_NAME}"
          fi
