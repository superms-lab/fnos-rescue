name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: npm run audit
        working-directory: web
      - run: ./scripts/security-scan.sh
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - run: sudo apt-get update && sudo apt-get install -y btrfs-progs mdadm qemu-utils e2fsprogs ntfs-3g
      - run: python -m pip install --upgrade pip build
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q src
      - run: fnos-rescue --version
      - run: fnos-rescue doctor
      - run: python -m build
      - run: python scripts/generate-release-metadata.py
      - if: matrix.python-version == '3.11'
        run: ./scripts/build-deb.sh
      - if: matrix.python-version == '3.11'
        run: |
          package=$(find dist -maxdepth 1 -name 'fnos-rescue_*_all.deb' -print -quit)
          test -n "$package"
          dpkg-deb --info "$package"
          sudo dpkg -i "$package"
          /usr/bin/fnos-rescue --version
