name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: npm run audit
        working-directory: web
      - run: ./scripts/security-scan.sh
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
      - run: sudo apt-get update && sudo apt-get install -y btrfs-progs mdadm qemu-utils e2fsprogs ntfs-3g build-essential autoconf automake libtool pkg-config uuid-dev libblkid-dev libudev-dev libzstd-dev liblzo2-dev zlib1g-dev libxxhash-dev liburing-dev
      - run: python -m pip install --upgrade pip build
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q src
      - run: fnos-rescue --version
      - run: fnos-rescue doctor
      - run: python -m build
      - run: python scripts/generate-release-metadata.py
      - if: matrix.python-version == '3.11'
        run: ./scripts/build-recovery-tools.sh
      - if: matrix.python-version == '3.11'
        name: Test disposable read-only Btrfs source to separate destination
        run: sudo ./scripts/test-disposable-btrfs-e2e.sh
      - if: matrix.python-version == '3.11'
        run: ./scripts/build-deb.sh
      - if: matrix.python-version == '3.11'
        run: |
          package=$(find dist -maxdepth 1 -name 'fnos-rescue_*.deb' -print -quit)
          test -n "$package"
          dpkg-deb --info "$package"
          sudo dpkg -i "$package"
          /usr/bin/fnos-rescue --version
      - if: matrix.python-version == '3.11'
        run: ./scripts/build-fnos-package.sh
      - if: matrix.python-version == '3.11'
        name: Test fnOS Web install, rollback, and uninstall lifecycle
        run: |
          sudo mkdir -p /fs /var/apps
          sudo touch /fs/.fnos-rescue-disposable-test
          package=$(find dist -maxdepth 1 -name 'fnos-rescue_*_fnos_*.tar.gz' -print -quit)
          test -n "$package"
          sudo env FNOS_RESCUE_DISPOSABLE_TEST=1 \
            ./scripts/test-fnos-package-lifecycle.sh "$package"
      - if: matrix.python-version == '3.11'
        name: Run clean release preflight
        run: ./scripts/release-preflight.sh
      - if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: fnos-rescue-fnos-package
          path: dist/fnos-rescue_*_fnos_*.tar.gz
          if-no-files-found: error
