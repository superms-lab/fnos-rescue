name: Bug report
description: Report a reproducible software or safety problem
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.2
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction using a generated fixture
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: Logs and paths are redacted and contain no credentials or private data.
          required: true
